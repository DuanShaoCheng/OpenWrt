name: Build OpenWrt Multi Device

on:
  workflow_dispatch:
    inputs:
      build_official:
        description: Build official OpenWrt router/SBC targets
        required: true
        type: boolean
        default: true
      build_n1:
        description: Build Phicomm N1 with ophub packaging
        required: true
        type: boolean
        default: true
  schedule:
    # GitHub Actions cron uses UTC. This updates sources, feeds, plugins,
    # and builds every Monday at 04:10 Asia/Shanghai.
    - cron: "10 20 * * 0"

concurrency:
  group: openwrt-multi-build
  cancel-in-progress: true

permissions:
  actions: read
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  OPENWRT_REPO: https://github.com/openwrt/openwrt.git
  OPENWRT_BRANCH: openwrt-25.12
  BUILD_AUTHOR: Duan
  DEFAULT_IP: 10.0.0.1
  DEFAULT_LOGIN: root/root
  ROOTFS_PARTSIZE_MB: "4096"
  TZ: Asia/Shanghai

jobs:
  official:
    name: ${{ matrix.name }}
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_official }}
    runs-on: ubuntu-24.04
    timeout-minutes: 350
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include:
          - name: x86-64-generic
            target: x86
            subtarget: "64"
            profile: generic
            extra_seed: configs/x86.seed

          - name: nanopi-r2s
            target: rockchip
            subtarget: armv8
            profile: friendlyarm_nanopi-r2s
            extra_seed: configs/sbc.seed

    steps:
      - name: Checkout config repo
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib \
            g++-multilib genisoimage gettext git libelf-dev libncurses-dev libssl-dev \
            python3 python3-dev python3-pip python3-pyelftools python3-setuptools \
            qemu-utils rsync swig unzip zlib1g-dev file wget
          python3 -m pip install --user pyelftools
          python3 -c "import elftools; print(elftools.__file__)"

      - name: Clone OpenWrt
        run: |
          git clone --depth 1 --branch "$OPENWRT_BRANCH" "$OPENWRT_REPO" openwrt

      - name: Restore downloads cache
        uses: actions/cache@v5
        with:
          path: openwrt/dl
          key: openwrt-dl-${{ env.OPENWRT_BRANCH }}-${{ matrix.target }}-${{ matrix.subtarget }}-${{ matrix.profile }}-${{ hashFiles('configs/*.seed', 'feeds.conf.default', 'diy-part1.sh') }}
          restore-keys: |
            openwrt-dl-${{ env.OPENWRT_BRANCH }}-${{ matrix.target }}-${{ matrix.subtarget }}-
            openwrt-dl-${{ env.OPENWRT_BRANCH }}-
            openwrt-dl-

      - name: Update and install feeds
        working-directory: openwrt
        run: |
          if [ -f ../feeds.conf.default ]; then
            cp ../feeds.conf.default feeds.conf.default
          fi
          if [ -f ../diy-part1.sh ]; then
            bash ../diy-part1.sh
          fi
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply device config
        working-directory: openwrt
        run: |
          {
            echo "CONFIG_TARGET_${{ matrix.target }}=y"
            echo "CONFIG_TARGET_${{ matrix.target }}_${{ matrix.subtarget }}=y"
            echo "CONFIG_TARGET_${{ matrix.target }}_${{ matrix.subtarget }}_DEVICE_${{ matrix.profile }}=y"
            cat ../configs/common.seed
            cat ../${{ matrix.extra_seed }}
          } > .config
          if [ -d ../files ]; then
            cp -a ../files ./files
            if [ -d ./files/etc/uci-defaults ]; then
              chmod 0755 ./files/etc/uci-defaults/*
            fi
          fi
          if [ -f ../diy-part2.sh ]; then
            bash ../diy-part2.sh
          fi
          make defconfig

      - name: Download package sources
        working-directory: openwrt
        run: make download -j"$(nproc)"

      - name: Build firmware
        working-directory: openwrt
        run: make -j"$(nproc)" || make -j1 V=s

      - name: Collect firmware
        if: always()
        run: |
          mkdir -p output
          target_dir="openwrt/bin/targets/${{ matrix.target }}/${{ matrix.subtarget }}"
          if [ -d "$target_dir" ]; then
            cp -a "$target_dir" "output/${{ matrix.name }}"
          elif [ -d openwrt/bin/targets ]; then
            cp -a openwrt/bin/targets output/targets
          fi
          find output -type d -name packages -prune -exec rm -rf {} + || true
          openwrt_commit="$(git -C openwrt rev-parse HEAD 2>/dev/null || true)"
          openwrt_commit_date="$(git -C openwrt log -1 --format=%cI 2>/dev/null || true)"
          cat > output/BUILD_INFO.txt <<EOF
          Author: ${BUILD_AUTHOR}
          Device: ${{ matrix.name }}
          OpenWrt branch: ${OPENWRT_BRANCH}
          OpenWrt commit: ${openwrt_commit}
          Default IP: ${DEFAULT_IP}
          Default login: ${DEFAULT_LOGIN}
          Rootfs part size: ${ROOTFS_PARTSIZE_MB} MB
          Writable overlay: auto-create remaining space as btrfs extroot on /overlay
          GitHub repository: ${{ github.repository }}
          GitHub run number: ${{ github.run_number }}
          Build time: $(date '+%Y-%m-%d %H:%M:%S %Z')
          EOF
          cat > output/SOURCE_VERSIONS.txt <<EOF
          OpenWrt repo: ${OPENWRT_REPO}
          OpenWrt branch: ${OPENWRT_BRANCH}
          OpenWrt commit: ${openwrt_commit}
          OpenWrt commit date: ${openwrt_commit_date}

          Feeds:
          EOF
          for feed in openwrt/feeds/*; do
            [ -d "$feed/.git" ] || continue
            feed_name="$(basename "$feed")"
            feed_commit="$(git -C "$feed" rev-parse HEAD 2>/dev/null || true)"
            feed_date="$(git -C "$feed" log -1 --format=%cI 2>/dev/null || true)"
            echo "- ${feed_name}: ${feed_commit} (${feed_date})" >> output/SOURCE_VERSIONS.txt
          done
          {
            echo
            echo "Third-party packages:"
            for package_dir in \
              "openclash:OpenClash" \
              "luci-app-cloudflarespeedtest:luci-app-cloudflarespeedtest"; do
              dir="${package_dir%%:*}"
              label="${package_dir#*:}"
              if [ -d "openwrt/package/${dir}/.git" ]; then
                package_commit="$(git -C "openwrt/package/${dir}" rev-parse HEAD 2>/dev/null || true)"
                package_date="$(git -C "openwrt/package/${dir}" log -1 --format=%cI 2>/dev/null || true)"
                echo "- ${label}: ${package_commit} (${package_date})"
              else
                echo "- ${label}: not found"
              fi
            done
          } >> output/SOURCE_VERSIONS.txt
          (
            cd output
            find . -type f ! -name SHA256SUMS.txt -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt
          )

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.BUILD_AUTHOR }}-OpenWrt-${{ matrix.name }}-${{ env.OPENWRT_BRANCH }}-${{ github.run_number }}
          path: output
          retention-days: 14

  phicomm-n1:
    name: phicomm-n1
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_n1 }}
    runs-on: ubuntu-24.04
    timeout-minutes: 350

    steps:
      - name: Checkout config repo
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib \
            g++-multilib genisoimage gettext git libelf-dev libncurses-dev libssl-dev \
            python3 python3-dev python3-pip python3-pyelftools python3-setuptools \
            qemu-utils rsync swig unzip zlib1g-dev file wget
          python3 -m pip install --user pyelftools
          python3 -c "import elftools; print(elftools.__file__)"

      - name: Clone OpenWrt
        run: |
          git clone --depth 1 --branch "$OPENWRT_BRANCH" "$OPENWRT_REPO" openwrt

      - name: Restore downloads cache
        uses: actions/cache@v5
        with:
          path: openwrt/dl
          key: openwrt-dl-${{ env.OPENWRT_BRANCH }}-armsr-armv8-n1-${{ hashFiles('configs/*.seed', 'feeds.conf.default', 'diy-part1.sh') }}
          restore-keys: |
            openwrt-dl-${{ env.OPENWRT_BRANCH }}-armsr-armv8-
            openwrt-dl-${{ env.OPENWRT_BRANCH }}-
            openwrt-dl-

      - name: Update and install feeds
        working-directory: openwrt
        run: |
          if [ -f ../feeds.conf.default ]; then
            cp ../feeds.conf.default feeds.conf.default
          fi
          if [ -f ../diy-part1.sh ]; then
            bash ../diy-part1.sh
          fi
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Build armsr/armv8 rootfs
        working-directory: openwrt
        run: |
          {
            echo "CONFIG_TARGET_armsr=y"
            echo "CONFIG_TARGET_armsr_armv8=y"
            echo "CONFIG_TARGET_armsr_armv8_DEVICE_generic=y"
            cat ../configs/common.seed
            cat ../configs/sbc.seed
            cat ../configs/amlogic-rootfs.seed
          } > .config
          if [ -d ../files ]; then
            cp -a ../files ./files
            if [ -d ./files/etc/uci-defaults ]; then
              chmod 0755 ./files/etc/uci-defaults/*
            fi
          fi
          if [ -f ../diy-part2.sh ]; then
            bash ../diy-part2.sh
          fi
          make defconfig
          make download -j"$(nproc)"
          make -j"$(nproc)" || make -j1 V=s

      - name: Package Phicomm N1 image
        uses: ophub/amlogic-s9xxx-openwrt@main
        with:
          openwrt_path: openwrt/bin/targets/armsr/armv8/*rootfs.tar.gz
          openwrt_board: s905d
          openwrt_kernel: 6.12.y
          auto_kernel: true
          openwrt_size: 4096
          openwrt_ip: ${{ env.DEFAULT_IP }}
          openwrt_files: files
          builder_name: ${{ env.BUILD_AUTHOR }}

      - name: Add Phicomm N1 output metadata
        run: |
          output_path="${PACKAGED_OUTPUTPATH}"
          if [ -z "$output_path" ] || [ ! -d "$output_path" ]; then
            echo "PACKAGED_OUTPUTPATH is empty or missing: $output_path"
            exit 1
          fi
          openwrt_commit="$(git -C openwrt rev-parse HEAD 2>/dev/null || true)"
          openwrt_commit_date="$(git -C openwrt log -1 --format=%cI 2>/dev/null || true)"
          cat > "$output_path/BUILD_INFO.txt" <<EOF
          Author: ${BUILD_AUTHOR}
          Device: phicomm-n1
          OpenWrt branch: ${OPENWRT_BRANCH}
          OpenWrt commit: ${openwrt_commit}
          Default IP: ${DEFAULT_IP}
          Default login: ${DEFAULT_LOGIN}
          Rootfs part size: ${ROOTFS_PARTSIZE_MB} MB
          Writable overlay: auto-create remaining space as btrfs extroot on /overlay
          GitHub repository: ${{ github.repository }}
          GitHub run number: ${{ github.run_number }}
          Build time: $(date '+%Y-%m-%d %H:%M:%S %Z')
          EOF
          cat > "$output_path/SOURCE_VERSIONS.txt" <<EOF
          OpenWrt repo: ${OPENWRT_REPO}
          OpenWrt branch: ${OPENWRT_BRANCH}
          OpenWrt commit: ${openwrt_commit}
          OpenWrt commit date: ${openwrt_commit_date}

          Feeds:
          EOF
          for feed in openwrt/feeds/*; do
            [ -d "$feed/.git" ] || continue
            feed_name="$(basename "$feed")"
            feed_commit="$(git -C "$feed" rev-parse HEAD 2>/dev/null || true)"
            feed_date="$(git -C "$feed" log -1 --format=%cI 2>/dev/null || true)"
            echo "- ${feed_name}: ${feed_commit} (${feed_date})" >> "$output_path/SOURCE_VERSIONS.txt"
          done
          {
            echo
            echo "Third-party packages:"
            for package_dir in \
              "openclash:OpenClash" \
              "luci-app-cloudflarespeedtest:luci-app-cloudflarespeedtest"; do
              dir="${package_dir%%:*}"
              label="${package_dir#*:}"
              if [ -d "openwrt/package/${dir}/.git" ]; then
                package_commit="$(git -C "openwrt/package/${dir}" rev-parse HEAD 2>/dev/null || true)"
                package_date="$(git -C "openwrt/package/${dir}" log -1 --format=%cI 2>/dev/null || true)"
                echo "- ${label}: ${package_commit} (${package_date})"
              else
                echo "- ${label}: not found"
              fi
            done
          } >> "$output_path/SOURCE_VERSIONS.txt"
          (
            cd "$output_path"
            find . -type f ! -name SHA256SUMS.txt -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt
          )

      - name: Upload Phicomm N1 artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.BUILD_AUTHOR }}-OpenWrt-phicomm-n1-${{ env.OPENWRT_BRANCH }}-${{ github.run_number }}
          path: ${{ env.PACKAGED_OUTPUTPATH }}
          retention-days: 14

  release:
    name: Publish release
    needs:
      - official
      - phicomm-n1
    if: ${{ always() && !cancelled() && (needs.official.result == 'success' || needs.phicomm-n1.result == 'success') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout config repo
        uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts

      - name: Package release assets
        id: package
        run: |
          tag="${BUILD_AUTHOR}-OpenWrt-${OPENWRT_BRANCH}-${GITHUB_RUN_NUMBER}"
          if [ "${GITHUB_RUN_ATTEMPT}" != "1" ]; then
            tag="${tag}-attempt-${GITHUB_RUN_ATTEMPT}"
          fi

          mkdir -p release-files
          max_asset_bytes=$((1900 * 1024 * 1024))

          safe_asset_name() {
            printf '%s' "$1" \
              | sed 's#[/\\:*?"<>|[:space:]]#-#g' \
              | sed 's#--*#-#g' \
              | sed 's#^-\|-$##g'
          }

          copy_release_asset() {
            src="$1"
            asset_name="$(safe_asset_name "$2")"
            dest="release-files/${asset_name}"

            if [ -e "$dest" ]; then
              base="${asset_name}"
              n=1
              while [ -e "release-files/${n}-${base}" ]; do
                n=$((n + 1))
              done
              dest="release-files/${n}-${base}"
            fi

            cp -f "$src" "$dest"
            size="$(stat -c%s "$dest")"
            if [ "$size" -ge "$max_asset_bytes" ]; then
              split -b 1900M -d -a 3 "$dest" "${dest}.part-"
              {
                echo "$(basename "$dest")"
                find release-files -maxdepth 1 -type f -name "$(basename "$dest").part-*" -printf "  - %f\n" | sort
              } >> release-files/SPLIT_ASSETS.txt
              rm -f "$dest"
            fi
          }

          for artifact in release-artifacts/*; do
            [ -d "$artifact" ] || continue
            name="$(basename "$artifact")"
            base="${name#${BUILD_AUTHOR}-OpenWrt-}"
            device="${base%-${OPENWRT_BRANCH}-${GITHUB_RUN_NUMBER}}"
            if [ "$device" = "$base" ]; then
              device="$name"
            fi

            while IFS= read -r -d '' file; do
              rel="${file#"$artifact"/}"
              case "$rel" in
                */packages/*) continue ;;
              esac

              short_rel="$rel"
              case "$short_rel" in
                "$device"/*) short_rel="${short_rel#"$device"/}" ;;
              esac

              case "$short_rel" in
                BUILD_INFO.txt)
                  asset="${BUILD_AUTHOR}-OpenWrt-${device}-${OPENWRT_BRANCH}-${GITHUB_RUN_NUMBER}-BUILD_INFO.txt"
                  ;;
                SHA256SUMS.txt)
                  asset="${BUILD_AUTHOR}-OpenWrt-${device}-${OPENWRT_BRANCH}-${GITHUB_RUN_NUMBER}-artifact-SHA256SUMS.txt"
                  ;;
                *)
                  asset="${BUILD_AUTHOR}-OpenWrt-${device}-${OPENWRT_BRANCH}-${GITHUB_RUN_NUMBER}-$(basename "$short_rel")"
                  ;;
              esac

              copy_release_asset "$file" "$asset"
            done < <(find "$artifact" -type f -print0 | sort -z)
          done

          cat > release-files/README_RELEASE_ASSETS.txt <<'EOF'
          Release assets are uploaded as separate files, not as one device zip.
          GitHub Releases requires every single asset to be smaller than 2GB.
          If one file is too large, it is split into .part-000, .part-001, ...

          Linux/macOS merge example for a split file:
            cat FILENAME.part-* > FILENAME

          Windows PowerShell merge example for a split file:
            $parts = Get-ChildItem "FILENAME.part-*" | Sort-Object Name
            $out = [IO.File]::Create("FILENAME")
            foreach ($part in $parts) {
              $in = [IO.File]::OpenRead($part.FullName)
              $in.CopyTo($out)
              $in.Close()
            }
            $out.Close()
          EOF

          (
            cd release-files
            find . -maxdepth 1 -type f ! -name SHA256SUMS.txt -print0 \
              | sort -z \
              | xargs -0 sha256sum > SHA256SUMS.txt
          )

          cat > release-notes.md <<EOF
          Author: ${BUILD_AUTHOR}
          OpenWrt branch: ${OPENWRT_BRANCH}
          Default IP: ${DEFAULT_IP}
          Default login: ${DEFAULT_LOGIN}
          Rootfs part size: ${ROOTFS_PARTSIZE_MB} MB
          Writable overlay: auto-create remaining space as btrfs extroot on /overlay

          Job results:
          - official: ${{ needs.official.result }}
          - phicomm-n1: ${{ needs.phicomm-n1.result }}

          Assets:
          $(find release-files -maxdepth 1 -type f -printf '- %f\n' | sort)
          EOF

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "title=${BUILD_AUTHOR} OpenWrt ${OPENWRT_BRANCH} #${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release delete "${{ steps.package.outputs.tag }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --cleanup-tag \
            --yes || true

          gh release create "${{ steps.package.outputs.tag }}" \
            release-files/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${{ steps.package.outputs.title }}" \
            --notes-file release-notes.md
